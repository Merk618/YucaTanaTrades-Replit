openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: YucaTanaTrades API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: journal
    description: Trade journal entries
  - name: watchlist
    description: Watchlist management
  - name: bots
    description: Bot status and logs
  - name: portfolio
    description: Portfolio data
  - name: market
    description: Market quotes, source health, and session status
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /journal:
    get:
      operationId: listJournalEntries
      tags: [journal]
      summary: List all trade journal entries
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal]
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journal/{id}:
    get:
      operationId: getJournalEntry
      tags: [journal]
      summary: Get a journal entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "404":
          description: Not found
    patch:
      operationId: updateJournalEntry
      tags: [journal]
      summary: Update a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
    delete:
      operationId: deleteJournalEntry
      tags: [journal]
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /journal/summary:
    get:
      operationId: getJournalSummary
      tags: [journal]
      summary: Get win/loss summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalSummary"

  /watchlist:
    get:
      operationId: listWatchlistItems
      tags: [watchlist]
      summary: Get all watchlist items
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"
    post:
      operationId: addWatchlistItem
      tags: [watchlist]
      summary: Add ticker to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItem"

  /watchlist/{id}:
    delete:
      operationId: removeWatchlistItem
      tags: [watchlist]
      summary: Remove item from watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bots/status:
    get:
      operationId: getBotsStatus
      tags: [bots]
      summary: Get status of all bots
      responses:
        "200":
          description: Bot statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotsStatus"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      summary: Get portfolio overview summary
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /market/quotes:
    get:
      operationId: getMarketQuotes
      tags: [market]
      summary: Batch quotes with source + freshness metadata
      parameters:
        - name: symbols
          in: query
          required: true
          description: Comma-separated ticker symbols (e.g. SPY,BTC,NVDA)
          schema:
            type: string
      responses:
        "200":
          description: Quotes with trust metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteList"

  /market/health:
    get:
      operationId: getSourceHealth
      tags: [market]
      summary: Real provider/source health status
      responses:
        "200":
          description: Source health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceHealth"

  /market/session:
    get:
      operationId: getMarketSession
      tags: [market]
      summary: Real US equity market session + crypto status
      responses:
        "200":
          description: Market session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSession"

  /market/test:
    get:
      operationId: testQuoteFetch
      tags: [market]
      summary: Test-fetch reference quotes (SPY / BTC) to verify live sources
      responses:
        "200":
          description: Test quote result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    JournalEntry:
      type: object
      required: [id, ticker, setupType, side, entryPrice, exitPrice, pnl, pnlPercent, thesis, outcome, tradeDate, createdAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        setupType:
          type: string
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        pnlPercent:
          type: ["number", "null"]
        thesis:
          type: string
        mistakes:
          type: ["string", "null"]
        lessons:
          type: ["string", "null"]
        outcome:
          type: string
          enum: [win, loss, breakeven, open]
        sector:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        tradeDate:
          type: string
        createdAt:
          type: string

    JournalEntryInput:
      type: object
      required: [ticker, setupType, side, entryPrice, thesis, outcome, tradeDate]
      properties:
        ticker:
          type: string
        setupType:
          type: string
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        pnlPercent:
          type: ["number", "null"]
        thesis:
          type: string
        mistakes:
          type: ["string", "null"]
        lessons:
          type: ["string", "null"]
        outcome:
          type: string
          enum: [win, loss, breakeven, open]
        sector:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        tradeDate:
          type: string

    JournalEntryUpdate:
      type: object
      properties:
        ticker:
          type: string
        setupType:
          type: string
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        pnlPercent:
          type: ["number", "null"]
        thesis:
          type: string
        mistakes:
          type: ["string", "null"]
        lessons:
          type: ["string", "null"]
        outcome:
          type: string
          enum: [win, loss, breakeven, open]
        sector:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        tradeDate:
          type: string

    JournalSummary:
      type: object
      required: [totalTrades, wins, losses, breakevens, openTrades, winRate, totalPnl, avgWin, avgLoss]
      properties:
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        breakevens:
          type: integer
        openTrades:
          type: integer
        winRate:
          type: number
        totalPnl:
          type: number
        avgWin:
          type: number
        avgLoss:
          type: number

    WatchlistItem:
      type: object
      required: [id, ticker, sector, notes, addedAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        sector:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        priority:
          type: string
          enum: [high, medium, low]
        addedAt:
          type: string

    WatchlistItemInput:
      type: object
      required: [ticker]
      properties:
        ticker:
          type: string
        sector:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        priority:
          type: string
          enum: [high, medium, low]

    BotsStatus:
      type: object
      required: [moomoo, cryptoHunter]
      properties:
        moomoo:
          $ref: "#/components/schemas/BotStatus"
        cryptoHunter:
          $ref: "#/components/schemas/BotStatus"

    BotStatus:
      type: object
      required: [name, status, lastScan, scansToday, isReadOnly]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [online, offline, scanning, idle, error]
        lastScan:
          type: ["string", "null"]
        scansToday:
          type: integer
        isReadOnly:
          type: boolean
        lastResult:
          type: ["string", "null"]
        health:
          type: string
          enum: [good, warning, critical]

    PortfolioSummary:
      type: object
      required: [totalValue, dayChange, dayChangePct, totalGain, totalGainPct, rothIra, individual, crypto]
      properties:
        totalValue:
          type: number
        dayChange:
          type: number
        dayChangePct:
          type: number
        totalGain:
          type: number
        totalGainPct:
          type: number
        rothIra:
          type: number
        individual:
          type: number
        crypto:
          type: number

    Quote:
      type: object
      required:
        [symbol, assetClass, price, change, changePercent, provider, sourceLabel, timestamp, isLive, isDelayed, isStale, isFallback, isDemo, marketSession, confidence, error]
      properties:
        symbol:
          type: string
        assetClass:
          type: string
          enum: [equity, etf, crypto, fundamentals, ai]
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        provider:
          type: string
        sourceLabel:
          type: string
        timestamp:
          type: string
        isLive:
          type: boolean
        isDelayed:
          type: boolean
        isStale:
          type: boolean
        isFallback:
          type: boolean
        isDemo:
          type: boolean
        marketSession:
          type: string
          enum: [open, pre, post, closed, holiday, "24h"]
        confidence:
          type: number
        error:
          type: ["string", "null"]

    QuoteList:
      type: object
      required: [asOf, quotes]
      properties:
        asOf:
          type: string
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/Quote"

    ProviderStatus:
      type: object
      required:
        [id, name, status, assetClasses, capabilities, configured, readOnly, isTradingCapable, liveCapable, envVars, sourceLabel, message, lastCheckedAt, lastSuccessAt, latencyMs, detail]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
            [connected, delayed, read_only, missing_api_key, auth_failed, health_check_failed, rate_limited, stale, not_connected, disabled, future_ready]
        assetClasses:
          type: array
          items:
            type: string
            enum: [equity, etf, crypto, fundamentals, ai]
        capabilities:
          type: array
          items:
            type: string
            enum: [quotes, fundamentals, news, filings, analysis, trading]
        configured:
          type: boolean
        readOnly:
          type: boolean
        isTradingCapable:
          type: boolean
        liveCapable:
          type: boolean
        envVars:
          type: array
          items:
            type: string
        sourceLabel:
          type: string
        message:
          type: string
        lastCheckedAt:
          type: string
        lastSuccessAt:
          type: ["string", "null"]
        latencyMs:
          type: ["number", "null"]
        detail:
          type: ["string", "null"]

    SourceHealthSummary:
      type: object
      required: [assetClass, label, activeProvider, activeProviderLabel, status, fallbackInUse, sourceLabel]
      properties:
        assetClass:
          type: string
          enum: [equity, etf, crypto, fundamentals, ai]
        label:
          type: string
        activeProvider:
          type: ["string", "null"]
        activeProviderLabel:
          type: ["string", "null"]
        status:
          type: string
        fallbackInUse:
          type: boolean
        sourceLabel:
          type: ["string", "null"]

    SourceHealth:
      type: object
      required: [asOf, providers, summary]
      properties:
        asOf:
          type: string
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderStatus"
        summary:
          type: array
          items:
            $ref: "#/components/schemas/SourceHealthSummary"

    MarketSessionSegment:
      type: object
      required: [state, isOpen, label]
      properties:
        state:
          type: string
          enum: [open, pre, post, closed, holiday, "24h"]
        isOpen:
          type: boolean
        label:
          type: string
        timezone:
          type: string
        nextChange:
          type: ["string", "null"]

    MarketSession:
      type: object
      required: [asOf, equities, crypto]
      properties:
        asOf:
          type: string
        equities:
          $ref: "#/components/schemas/MarketSessionSegment"
        crypto:
          $ref: "#/components/schemas/MarketSessionSegment"
