openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: YucaTanaTrades API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: journal
    description: Trade journal entries
  - name: watchlist
    description: Watchlist management
  - name: bots
    description: Bot status and logs
  - name: portfolio
    description: Portfolio data
  - name: market
    description: Market quotes, source health, and session status
  - name: settings
    description: App settings and user preferences
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /journal:
    get:
      operationId: listJournalEntries
      tags: [journal]
      summary: List all trade journal entries
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal]
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journal/{id}:
    get:
      operationId: getJournalEntry
      tags: [journal]
      summary: Get a journal entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "404":
          description: Not found
    patch:
      operationId: updateJournalEntry
      tags: [journal]
      summary: Update a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
    delete:
      operationId: deleteJournalEntry
      tags: [journal]
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /journal/summary:
    get:
      operationId: getJournalSummary
      tags: [journal]
      summary: Get win/loss summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalSummary"

  /watchlist:
    get:
      operationId: listWatchlistItems
      tags: [watchlist]
      summary: Get all watchlist items
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"
    post:
      operationId: addWatchlistItem
      tags: [watchlist]
      summary: Add ticker to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItem"

  /watchlist/{id}:
    delete:
      operationId: removeWatchlistItem
      tags: [watchlist]
      summary: Remove item from watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bots/status:
    get:
      operationId: getBotsStatus
      tags: [bots]
      summary: Get status of all bots
      responses:
        "200":
          description: Bot statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotsStatus"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      summary: Get portfolio overview summary
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /positions/bulk:
    post:
      operationId: bulkCreatePositions
      tags: [portfolio]
      summary: Bulk-create portfolio positions (CSV import)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreatePositionsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreatePositionsResult"

  /positions:
    get:
      operationId: listPositions
      tags: [portfolio]
      summary: List all portfolio positions
      responses:
        "200":
          description: List of positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioPosition"
    post:
      operationId: createPosition
      tags: [portfolio]
      summary: Create a new portfolio position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioPositionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPosition"

  /positions/{id}:
    get:
      operationId: getPosition
      tags: [portfolio]
      summary: Get a position by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPosition"
        "404":
          description: Not found
    patch:
      operationId: updatePosition
      tags: [portfolio]
      summary: Update a portfolio position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioPositionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPosition"
    delete:
      operationId: deletePosition
      tags: [portfolio]
      summary: Delete a portfolio position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings/risk:
    get:
      operationId: getRiskConfig
      tags: [settings]
      summary: Get the active risk threshold configuration
      responses:
        "200":
          description: Active risk config (DB row or hardcoded defaults)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskConfig"
    put:
      operationId: updateRiskConfig
      tags: [settings]
      summary: Update risk threshold configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskConfigInput"
      responses:
        "200":
          description: Updated risk config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskConfig"
        "400":
          description: Validation error

  /market/quotes:
    get:
      operationId: getMarketQuotes
      tags: [market]
      summary: Batch quotes with source + freshness metadata
      parameters:
        - name: symbols
          in: query
          required: true
          description: Comma-separated ticker symbols (e.g. SPY,BTC,NVDA)
          schema:
            type: string
      responses:
        "200":
          description: Quotes with trust metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteList"

  /market/health:
    get:
      operationId: getSourceHealth
      tags: [market]
      summary: Real provider/source health status
      parameters:
        - name: refresh
          in: query
          required: false
          description: Force a fresh probe of every provider, bypassing cache
          schema:
            type: boolean
      responses:
        "200":
          description: Source health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceHealth"

  /market/session:
    get:
      operationId: getMarketSession
      tags: [market]
      summary: Real US equity market session + crypto status
      responses:
        "200":
          description: Market session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSession"

  /market/test:
    get:
      operationId: testQuoteFetch
      tags: [market]
      summary: Test-fetch reference quotes (SPY / BTC) to verify live sources
      responses:
        "200":
          description: Test quote result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    JournalEntry:
      type: object
      required: [id, ticker, setupType, side, entryPrice, exitPrice, pnl, pnlPercent, thesis, outcome, tradeDate, createdAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        setupType:
          type: string
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        pnlPercent:
          type: ["number", "null"]
        thesis:
          type: string
        mistakes:
          type: ["string", "null"]
        lessons:
          type: ["string", "null"]
        outcome:
          type: string
          enum: [win, loss, breakeven, open]
        sector:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        tradeDate:
          type: string
        createdAt:
          type: string

    JournalEntryInput:
      type: object
      required: [ticker, setupType, side, entryPrice, thesis, outcome, tradeDate]
      properties:
        ticker:
          type: string
        setupType:
          type: string
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        pnlPercent:
          type: ["number", "null"]
        thesis:
          type: string
        mistakes:
          type: ["string", "null"]
        lessons:
          type: ["string", "null"]
        outcome:
          type: string
          enum: [win, loss, breakeven, open]
        sector:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        tradeDate:
          type: string

    JournalEntryUpdate:
      type: object
      properties:
        ticker:
          type: string
        setupType:
          type: string
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        pnlPercent:
          type: ["number", "null"]
        thesis:
          type: string
        mistakes:
          type: ["string", "null"]
        lessons:
          type: ["string", "null"]
        outcome:
          type: string
          enum: [win, loss, breakeven, open]
        sector:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        tradeDate:
          type: string

    JournalSummary:
      type: object
      required: [totalTrades, wins, losses, breakevens, openTrades, winRate, totalPnl, avgWin, avgLoss]
      properties:
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        breakevens:
          type: integer
        openTrades:
          type: integer
        winRate:
          type: number
        totalPnl:
          type: number
        avgWin:
          type: number
        avgLoss:
          type: number

    WatchlistItem:
      type: object
      required: [id, ticker, sector, notes, addedAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        sector:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        priority:
          type: string
          enum: [high, medium, low]
        addedAt:
          type: string

    WatchlistItemInput:
      type: object
      required: [ticker]
      properties:
        ticker:
          type: string
        sector:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        priority:
          type: string
          enum: [high, medium, low]

    BotsStatus:
      type: object
      required: [moomoo, cryptoHunter]
      properties:
        moomoo:
          $ref: "#/components/schemas/BotStatus"
        cryptoHunter:
          $ref: "#/components/schemas/BotStatus"

    BotStatus:
      type: object
      required: [name, status, lastScan, scansToday, isReadOnly]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [online, offline, scanning, idle, error]
        lastScan:
          type: ["string", "null"]
        scansToday:
          type: integer
        isReadOnly:
          type: boolean
        lastResult:
          type: ["string", "null"]
        health:
          type: string
          enum: [good, warning, critical]

    PortfolioSummary:
      type: object
      required: [totalValue, dayChange, dayChangePct, totalGain, totalGainPct, rothIra, individual, crypto]
      properties:
        totalValue:
          type: number
        dayChange:
          type: number
        dayChangePct:
          type: number
        totalGain:
          type: number
        totalGainPct:
          type: number
        rothIra:
          type: number
        individual:
          type: number
        crypto:
          type: number

    PortfolioPositionSleeve:
      type: string
      enum: [rothIra, individual, crypto]

    PortfolioPosition:
      type: object
      required: [id, ticker, name, shares, avgCost, sleeve, sector, createdAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        name:
          type: string
        shares:
          type: number
        avgCost:
          type: number
        sleeve:
          $ref: "#/components/schemas/PortfolioPositionSleeve"
        sector:
          type: string
        createdAt:
          type: string

    PortfolioPositionInput:
      type: object
      required: [ticker, name, shares, avgCost, sleeve, sector]
      properties:
        ticker:
          type: string
        name:
          type: string
        shares:
          type: number
        avgCost:
          type: number
        sleeve:
          $ref: "#/components/schemas/PortfolioPositionSleeve"
        sector:
          type: string

    PortfolioPositionUpdate:
      type: object
      properties:
        ticker:
          type: string
        name:
          type: string
        shares:
          type: number
        avgCost:
          type: number
        sleeve:
          $ref: "#/components/schemas/PortfolioPositionSleeve"
        sector:
          type: string

    BulkCreatePositionsInput:
      type: object
      required: [positions]
      properties:
        positions:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioPositionInput"
          minItems: 1

    BulkCreatePositionsResult:
      type: object
      required: [created, positions]
      properties:
        created:
          type: integer
        positions:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioPosition"

    Quote:
      type: object
      required:
        [symbol, assetClass, price, change, changePercent, provider, sourceLabel, timestamp, isLive, isDelayed, isStale, isFallback, isDemo, marketSession, confidence, error]
      properties:
        symbol:
          type: string
        assetClass:
          type: string
          enum: [equity, etf, crypto, fundamentals, ai]
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        provider:
          type: string
        sourceLabel:
          type: string
        timestamp:
          type: string
        isLive:
          type: boolean
        isDelayed:
          type: boolean
        isStale:
          type: boolean
        isFallback:
          type: boolean
        isDemo:
          type: boolean
        marketSession:
          type: string
          enum: [open, pre, post, closed, holiday, "24h"]
        confidence:
          type: number
        error:
          type: ["string", "null"]

    QuoteList:
      type: object
      required: [asOf, quotes]
      properties:
        asOf:
          type: string
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/Quote"

    ProviderStatus:
      type: object
      required:
        [id, name, status, assetClasses, capabilities, configured, readOnly, isTradingCapable, liveCapable, envVars, sourceLabel, message, lastCheckedAt, lastSuccessAt, latencyMs, detail]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
            [connected, delayed, read_only, missing_api_key, auth_failed, health_check_failed, rate_limited, stale, not_connected, disabled, future_ready]
        assetClasses:
          type: array
          items:
            type: string
            enum: [equity, etf, crypto, fundamentals, ai]
        capabilities:
          type: array
          items:
            type: string
            enum: [quotes, fundamentals, news, filings, analysis, trading]
        configured:
          type: boolean
        readOnly:
          type: boolean
        isTradingCapable:
          type: boolean
        liveCapable:
          type: boolean
        envVars:
          type: array
          items:
            type: string
        sourceLabel:
          type: string
        message:
          type: string
        lastCheckedAt:
          type: string
        lastSuccessAt:
          type: ["string", "null"]
        latencyMs:
          type: ["number", "null"]
        detail:
          type: ["string", "null"]

    SourceHealthSummary:
      type: object
      required: [assetClass, label, activeProvider, activeProviderLabel, status, fallbackInUse, sourceLabel]
      properties:
        assetClass:
          type: string
          enum: [equity, etf, crypto, fundamentals, ai]
        label:
          type: string
        activeProvider:
          type: ["string", "null"]
        activeProviderLabel:
          type: ["string", "null"]
        status:
          type: string
        fallbackInUse:
          type: boolean
        sourceLabel:
          type: ["string", "null"]

    SourceHealth:
      type: object
      required: [asOf, providers, summary]
      properties:
        asOf:
          type: string
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderStatus"
        summary:
          type: array
          items:
            $ref: "#/components/schemas/SourceHealthSummary"

    MarketSessionSegment:
      type: object
      required: [state, isOpen, label]
      properties:
        state:
          type: string
          enum: [open, pre, post, closed, holiday, "24h"]
        isOpen:
          type: boolean
        label:
          type: string
        timezone:
          type: string
        nextChange:
          type: ["string", "null"]

    MarketSession:
      type: object
      required: [asOf, equities, crypto]
      properties:
        asOf:
          type: string
        equities:
          $ref: "#/components/schemas/MarketSessionSegment"
        crypto:
          $ref: "#/components/schemas/MarketSessionSegment"

    RiskConfig:
      type: object
      required: [singlePositionLimit, cryptoPositionLimit, cryptoAllocationLimit, sectorConcentrationLimit, maxDrawdownAlert, isDefault, updatedAt]
      properties:
        singlePositionLimit:
          type: integer
          description: Max % of total portfolio in any single non-crypto holding
        cryptoPositionLimit:
          type: integer
          description: Max % of total portfolio in any single crypto holding
        cryptoAllocationLimit:
          type: integer
          description: Max % of total portfolio in the crypto sleeve
        sectorConcentrationLimit:
          type: integer
          description: Max % of total portfolio in any one sector
        maxDrawdownAlert:
          type: integer
          description: Max drawdown % before alert fires
        isDefault:
          type: boolean
          description: True when no user row exists and defaults are returned
        updatedAt:
          type: ["string", "null"]
          description: ISO timestamp of last user update, null when using defaults

    RiskConfigInput:
      type: object
      required: [singlePositionLimit, cryptoPositionLimit, cryptoAllocationLimit, sectorConcentrationLimit, maxDrawdownAlert]
      properties:
        singlePositionLimit:
          type: integer
          minimum: 1
          maximum: 100
        cryptoPositionLimit:
          type: integer
          minimum: 1
          maximum: 100
        cryptoAllocationLimit:
          type: integer
          minimum: 1
          maximum: 100
        sectorConcentrationLimit:
          type: integer
          minimum: 1
          maximum: 100
        maxDrawdownAlert:
          type: integer
          minimum: 1
          maximum: 100
